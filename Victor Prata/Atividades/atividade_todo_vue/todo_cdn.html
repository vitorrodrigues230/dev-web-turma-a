<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do Vue (CDN)</title>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
    body {
      background: linear-gradient(135deg, #1a0033 0%, #2d0052 100%);
      min-height: 100vh; padding: 20px;
      display: flex; justify-content: center; align-items: flex-start;
    }
    .container {
      background: #fff; width: 100%; max-width: 600px;
      padding: 30px; border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.3);
    }
    h1 { text-align: center; color: #2d0052; margin-bottom: 25px; }
    .formulario { display: flex; gap: 10px; margin-bottom: 20px; }
    .input-tarefa {
      flex: 1; padding: 12px 15px; font-size: 1rem;
      border: 2px solid #ddd; border-radius: 8px; outline: none;
    }
    .input-tarefa:focus { border-color: #2d0052; }
    .btn-adicionar {
      background: #2d0052; color: #fff; border: none;
      padding: 12px 20px; font-weight: bold;
      border-radius: 8px; cursor: pointer;
    }
    .btn-adicionar:hover { background: #4a0080; }
    .lista { list-style: none; }
    .item-tarefa {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 15px; background: #f5f5f5;
      border-radius: 8px; margin-bottom: 8px;
    }
    .item-tarefa:hover { background: #eaeaea; }
    .checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: #2d0052; }
    .texto { flex: 1; color: #333; word-break: break-word; }
    .concluida .texto { text-decoration: line-through; color: #999; }
    .btn-remover {
      background: transparent; border: none;
      font-size: 1.1rem; cursor: pointer; padding: 5px 8px;
      border-radius: 5px;
    }
    .btn-remover:hover { background: #ffdddd; }
    .vazio { text-align: center; color: #888; margin-top: 20px; font-style: italic; }
    .contador {
      display: flex; justify-content: space-around;
      margin-top: 20px; padding-top: 15px;
      border-top: 1px solid #eee; color: #555; font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="container">
      <h1>Minha Lista de Tarefas</h1>

      
      <form class="formulario" @submit.prevent="adicionarTarefa">
        <input type="text" v-model="novaTarefa" placeholder="Digite uma nova tarefa..." class="input-tarefa" />
        <button type="submit" class="btn-adicionar">Adicionar</button>
      </form>

      
      <ul class="lista">
        <li v-for="tarefa in tarefas"
            :key="tarefa.id"
            class="item-tarefa"
            :class="{ concluida: tarefa.concluida }">
          <input type="checkbox"
                 :checked="tarefa.concluida"
                 @click="concluirTarefa(tarefa.id)"
                 class="checkbox" />
          <span class="texto">{{ tarefa.texto }}</span>
          <button class="btn-remover" @click="removerTarefa(tarefa.id)">❌</button>
        </li>
      </ul>

      
      <p v-if="tarefas.length === 0" class="vazio">
        Nenhuma tarefa cadastrada. Adicione a primeira! 
      </p>
      <div v-else class="contador">
        <span>Total: {{ tarefas.length }}</span>
        <span>Concluídas: {{ totalConcluidas }}</span>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          novaTarefa: '',
          tarefas: []
        }
      },
      computed: {
        totalConcluidas() {
          return this.tarefas.filter(t => t.concluida).length;
        }
      },
      methods: {
        adicionarTarefa() {
          const texto = this.novaTarefa.trim();
          if (texto === '') return;
          this.tarefas.push({
            id: Date.now(),
            texto: texto,
            concluida: false
          });
          this.novaTarefa = '';
        },
        concluirTarefa(id) {
          const tarefa = this.tarefas.find(t => t.id === id);
          if (tarefa) tarefa.concluida = !tarefa.concluida;
        },
        removerTarefa(id) {
          this.tarefas = this.tarefas.filter(t => t.id !== id);
        }
      },
      mounted() {
        console.log('App montado no DOM!');
      }
    }).mount('#app');
  </script>
</body>
</html>
